<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Profile</title>
  <link rel="stylesheet" href="work.css">
</head>
<body>

  <header class="welcome">
    <h1>Welcome To Your Admin Profile</h1>
  </header>

  <div class="container">

  <form class="page">
    <label for="username">Username</label>
    <input type="text" placeholder="E.g., Emmanuel" id="username" name="username" minlength="3" maxlength="30" required>
    <label for="password">Password</label>
    <input type="password" required name="password" minlength="3" maxlength="30" id="password">
    <a href="#" class="account">Create Account</a>
  </form>

  </div>

  <button class="login-btn">Login</button>
  
</body>
</html>
