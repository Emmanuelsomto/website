<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards</title>
  <link rel="stylesheet" href="card.css">
</head>
<body>
  <h2>Training Report</h2>
  <p class="arrow">↑ 3</p>

    <div class="cards-container">
      <h3>ENDRICK</h3>
      <p class="white"> ★ ★ ★ ★ ★</p>
      <h5>STRIKER</h5>
      <h6>Growth Potential<span class="colour"> EXCEPTION</span></h6>
      <button class="btns">↑ ATT</button>
    </div>

    <div class="cards-container">
      <h3>CASTELLO LUKEBA</h3>
       <p class="white"> ★ ★ ★ ★ ★</p>
      <h5>CENTER-BACK</h5>
      <h6>Growth Potential<span class="colour"> HIGH</span></h6>
      <button class="btns">↑ DEF</button>
    </div>

    <div class="cards-container">
      <h3>MAXIM DE CUYPER</h3>
      <p class="white"> ★ ★ ★ ★ <span class="star">★</span></p>
      <h5>FULL-BACK</h5>
      <h6>Growth Potential<span class="colour"> HIGH</span></h6>
      <button class="btns">↑ ATT</button>
    </div>

    <button class="btn">CONTINUE</button>
  
</body>
</html>
